<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trash Sorter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f4fcf7] min-h-screen flex flex-col items-center py-10 px-4 font-sans">
    
    <!-- TITLE -->
    <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-extrabold text-[#112a21] mb-2">
            Smart Trash <span class="text-[#10b981]">Sorter</span>
        </h1>
        <p class="text-gray-500 mt-2">Real-time waste detection system</p>
    </div>

    <div class="w-full max-w-4xl bg-white rounded-3xl shadow-xl border border-gray-100 p-6">

        <!-- CAMERA VIEW -->
        <div class="bg-black w-full rounded-2xl overflow-hidden relative flex justify-center items-center min-h-[400px]">
            <img src="{{ url_for('video_feed') }}" class="w-full h-auto object-cover">

            <!-- STATUS BADGE -->
            <div id="camera-indicator"
                class="absolute top-4 left-4 bg-green-600 text-white px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-2 shadow-lg">
                <div class="w-2 h-2 bg-white rounded-full animate-pulse"></div>
                <span>AI SENSOR ACTIVE</span>
            </div>
        </div>
</body>
</html>
